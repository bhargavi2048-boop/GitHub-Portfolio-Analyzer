<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Portfolio Leaderboard — Top Developers</title>
  <meta name="description" content="See the top GitHub developer portfolios ranked by portfolio score. Updated in real time.">
  <meta property="og:title" content="GitHub Portfolio Leaderboard">
  <meta property="og:description" content="Top GitHub developer portfolios ranked by portfolio score.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <style>
    :root {
      --primary-teal:#0d7377; --dark-teal:#051d2a; --light-teal:#14919b;
      --accent-teal:#76c7d1; --text-dark:#1a1a1a; --text-light:#ffffff;
      --bg-light:#f5f9fa; --bg-card:#ffffff; --border:#e0e0e0;
      --success:#28a745; --shadow:0 2px 8px rgba(13,115,119,.1);
      --shadow-lg:0 8px 24px rgba(13,115,119,.15);
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    html{scroll-behavior:smooth;}
    body{
      font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
      background:linear-gradient(135deg,#0d7377 0%,#051d2a 100%);
      min-height:100vh; color:var(--text-dark);
    }
    .container{max-width:960px;margin:0 auto;padding:40px 20px;}
    @keyframes fadeInUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

    /* Header */
    .lb-header{text-align:center;padding:50px 0 36px;color:#fff;animation:fadeInUp .6s ease;}
    .lb-header h1{font-size:2.8em;font-weight:800;letter-spacing:-.5px;margin-bottom:8px;}
    .lb-header .sub{font-size:1.05em;opacity:.85;margin-bottom:20px;}
    .live-badge{
      display:inline-flex;align-items:center;gap:6px;
      background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);
      border-radius:20px;padding:6px 14px;font-size:.8em;color:#fff;
      backdrop-filter:blur(6px);
    }
    .live-dot{width:8px;height:8px;border-radius:50%;background:#4cff8a;animation:pulse 1.8s ease infinite;}

    /* Controls */
    .controls{
      display:flex;gap:12px;align-items:center;flex-wrap:wrap;
      margin-bottom:24px;
    }
    .search-box{
      flex:1;min-width:180px;padding:10px 16px;border-radius:10px;
      border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.1);
      color:#fff;font-size:.95em;outline:none;
      backdrop-filter:blur(6px);transition:border .2s;
    }
    .search-box::placeholder{color:rgba(255,255,255,.55);}
    .search-box:focus{border-color:var(--accent-teal);}
    .filter-btn{
      padding:10px 18px;border-radius:10px;border:1px solid rgba(255,255,255,.25);
      background:rgba(255,255,255,.1);color:#fff;cursor:pointer;font-size:.85em;
      backdrop-filter:blur(6px);transition:background .2s,border .2s;white-space:nowrap;
    }
    .filter-btn.active,.filter-btn:hover{background:rgba(255,255,255,.22);border-color:var(--accent-teal);}

    /* Card / table */
    .lb-card{
      background:#fff;border-radius:18px;box-shadow:var(--shadow-lg);
      overflow:hidden;animation:fadeInUp .5s ease;
    }
    .lb-top-bar{
      display:flex;justify-content:space-between;align-items:center;
      padding:18px 28px;border-bottom:1px solid var(--border);
      background:linear-gradient(90deg,#f5f9fa,#eef6f7);
    }
    .lb-top-bar h2{font-size:1.1em;color:var(--primary-teal);font-weight:700;}
    .total-badge{
      background:var(--primary-teal);color:#fff;
      border-radius:20px;padding:4px 12px;font-size:.8em;font-weight:600;
    }
    .refresh-btn{
      background:none;border:1px solid var(--accent-teal);color:var(--primary-teal);
      border-radius:8px;padding:6px 14px;cursor:pointer;font-size:.82em;font-weight:600;
      transition:background .2s;
    }
    .refresh-btn:hover{background:var(--accent-teal);color:#fff;}

    /* Rows */
    .lb-row{
      display:flex;align-items:center;gap:16px;
      padding:14px 28px;border-bottom:1px solid #f0f0f0;
      transition:background .15s;cursor:pointer;text-decoration:none;color:inherit;
    }
    .lb-row:last-child{border-bottom:none;}
    .lb-row:hover{background:#f5f9fa;}
    .lb-row.top-3{background:linear-gradient(90deg,rgba(13,115,119,.04),transparent);}

    /* Position */
    .pos{
      width:36px;text-align:center;font-weight:800;font-size:1em;
      flex-shrink:0;
    }
    .pos.gold{color:#f5a623;}
    .pos.silver{color:#9badb7;}
    .pos.bronze{color:#c07d48;}
    .medal{font-size:1.3em;}

    /* Avatar */
    .avatar{
      width:46px;height:46px;border-radius:50%;border:2px solid var(--accent-teal);
      flex-shrink:0;background:#ddd;
    }

    /* Info */
    .lb-info{flex:1;min-width:0;}
    .lb-username{font-weight:700;font-size:1em;color:var(--text-dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .lb-langs{font-size:.78em;color:#888;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

    /* Score */
    .lb-score-col{text-align:right;flex-shrink:0;}
    .lb-score-num{font-size:1.5em;font-weight:800;color:var(--primary-teal);line-height:1;}
    .lb-score-sub{font-size:.72em;color:#aaa;}

    /* Rank badge */
    .rank-badge{
      display:inline-block;padding:3px 10px;border-radius:20px;
      font-size:.78em;font-weight:700;flex-shrink:0;min-width:28px;text-align:center;
    }
    .rank-S{background:#fef3c7;color:#d97706;}
    .rank-A{background:#d1fae5;color:#065f46;}
    .rank-B{background:#dbeafe;color:#1d4ed8;}
    .rank-C{background:#f3e8ff;color:#6d28d9;}
    .rank-D{background:#fee2e2;color:#b91c1c;}

    /* Mini lang bar */
    .mini-bar{display:flex;height:4px;border-radius:2px;overflow:hidden;width:80px;flex-shrink:0;gap:1px;}
    .mini-bar-seg{flex:1;}

    /* Loading */
    .lb-loading{
      display:flex;flex-direction:column;align-items:center;gap:16px;
      padding:60px 20px;color:#888;
    }
    .spinner{
      width:40px;height:40px;border:3px solid #e0e0e0;
      border-top-color:var(--primary-teal);border-radius:50%;animation:spin 1s linear infinite;
    }

    /* Empty */
    .lb-empty{text-align:center;padding:60px 20px;color:#aaa;}
    .lb-empty p{margin-top:8px;font-size:.9em;}

    /* Stats summary */
    .lb-stats{
      display:flex;gap:16px;flex-wrap:wrap;
      padding:16px 28px;background:#f9fdfе;border-top:1px solid #f0f0f0;
    }
    .lb-stat{flex:1;min-width:100px;text-align:center;padding:10px;}
    .lb-stat .val{font-size:1.4em;font-weight:700;color:var(--primary-teal);}
    .lb-stat .lbl{font-size:.75em;color:#888;margin-top:2px;}

    /* Nav link */
    .nav-back{
      display:inline-flex;align-items:center;gap:6px;
      color:rgba(255,255,255,.8);font-size:.9em;text-decoration:none;
      margin-bottom:20px;transition:color .2s;
    }
    .nav-back:hover{color:#fff;}

    /* Countdown */
    .countdown{font-size:.78em;color:rgba(255,255,255,.65);margin-top:6px;}

    @media(max-width:600px){
      .lb-header h1{font-size:1.9em;}
      .lb-row{padding:12px 16px;gap:12px;}
      .mini-bar{display:none;}
      .lb-top-bar{padding:14px 16px;}
      .lb-stats{padding:12px 16px;}
    }
  </style>
</head>
<body>
<div class="container">
  <a class="nav-back" href="/">← Back to Analyzer</a>

  <div class="lb-header">
    <h1>🏆 Leaderboard</h1>
    <p class="sub">Top GitHub developer portfolios, ranked by score</p>
    <div class="live-badge">
      <div class="live-dot"></div>
      <span id="liveLabel">Live · auto-refreshes every 60s</span>
    </div>
    <div class="countdown" id="countdownEl"></div>
  </div>

  <div class="controls">
    <input class="search-box" id="searchBox" placeholder="🔍 Filter by username…" autocomplete="off">
    <button class="filter-btn active" data-rank="all">All Ranks</button>
    <button class="filter-btn" data-rank="S">S</button>
    <button class="filter-btn" data-rank="A">A</button>
    <button class="filter-btn" data-rank="B">B</button>
    <button class="filter-btn" data-rank="C">C+</button>
  </div>

  <div class="lb-card" id="lbCard">
    <div class="lb-top-bar">
      <h2>Top Profiles</h2>
      <div style="display:flex;gap:10px;align-items:center;">
        <span class="total-badge" id="totalBadge">—</span>
        <button class="refresh-btn" id="refreshBtn" onclick="fetchLeaderboard(true)">↻ Refresh</button>
      </div>
    </div>
    <div id="lbBody">
      <div class="lb-loading"><div class="spinner"></div><p>Loading leaderboard…</p></div>
    </div>
    <div class="lb-stats" id="lbStats" style="display:none">
      <div class="lb-stat"><div class="val" id="statAvg">—</div><div class="lbl">Avg Score</div></div>
      <div class="lb-stat"><div class="val" id="statTop">—</div><div class="lbl">Top Score</div></div>
      <div class="lb-stat"><div class="val" id="statSRank">—</div><div class="lbl">S Rank Devs</div></div>
      <div class="lb-stat"><div class="val" id="statARank">—</div><div class="lbl">A Rank Devs</div></div>
    </div>
  </div>
</div>

<script>
(function(){
  const LANG_COLORS = ['#0d7377','#14919b','#76c7d1','#2d8a8e','#1a6b6f','#3aadb4','#5bc5cb','#89d7db'];
  const REFRESH_INTERVAL = 60;
  let allEntries = [];
  let filterRank = 'all';
  let searchTerm = '';
  let countdownSec = REFRESH_INTERVAL;
  let countdownTimer;

  function fetchLeaderboard(manual = false) {
    const body = document.getElementById('lbBody');
    if (manual) {
      body.innerHTML = '<div class="lb-loading"><div class="spinner"></div><p>Refreshing…</p></div>';
    }
    clearInterval(countdownTimer);
    countdownSec = REFRESH_INTERVAL;

    fetch('/api/leaderboard?limit=50')
      .then(r => r.ok ? r.json() : Promise.reject(r.status))
      .then(data => {
        allEntries = data.leaderboard || [];
        document.getElementById('totalBadge').textContent = (data.total || allEntries.length) + ' analyzed';
        renderStats();
        renderRows();
        startCountdown();
      })
      .catch(() => {
        body.innerHTML = '<div class="lb-empty">⚠️ <p>Could not load leaderboard. Try refreshing.</p></div>';
      });
  }

  function renderStats() {
    if (!allEntries.length) return;
    const scores = allEntries.map(e => e.score);
    const avg = Math.round(scores.reduce((a,b)=>a+b,0)/scores.length);
    const top = Math.max(...scores);
    const sCount = allEntries.filter(e=>e.rank==='S').length;
    const aCount = allEntries.filter(e=>e.rank==='A').length;
    document.getElementById('statAvg').textContent = avg;
    document.getElementById('statTop').textContent = top;
    document.getElementById('statSRank').textContent = sCount;
    document.getElementById('statARank').textContent = aCount;
    document.getElementById('lbStats').style.display = 'flex';
  }

  function renderRows() {
    const filtered = allEntries.filter(e => {
      const matchRank = filterRank === 'all' ||
        (filterRank === 'C' ? ['C','D'].includes(e.rank) : e.rank === filterRank);
      const matchSearch = !searchTerm || e.username.toLowerCase().includes(searchTerm.toLowerCase());
      return matchRank && matchSearch;
    });

    const body = document.getElementById('lbBody');
    if (!filtered.length) {
      body.innerHTML = '<div class="lb-empty">🔍 <p>No profiles match your filter.</p></div>';
      return;
    }

    const medals = {1:'🥇',2:'🥈',3:'🥉'};
    const posClass = {1:'gold',2:'silver',3:'bronze'};

    body.innerHTML = filtered.map((e, i) => {
      const globalPos = e.position || (i + 1);
      const medal = medals[globalPos];
      const langs = (e.languages || []).slice(0,4);

      return `<a class="lb-row${globalPos<=3?' top-3':''}" href="/p/${encodeURIComponent(e.username)}" title="View @${e.username}'s portfolio">
        <div class="pos ${posClass[globalPos]||''}">
          ${medal ? `<span class="medal">${medal}</span>` : `#${globalPos}`}
        </div>
        <img class="avatar" src="${e.avatarUrl||'https://github.com/ghost.png'}"
          alt="@${e.username}"
          onerror="this.src='https://github.com/ghost.png'">
        <div class="lb-info">
          <div class="lb-username">@${esc(e.username)}</div>
          <div class="lb-langs">${langs.length ? langs.map(l=>l.name).join(' · ') : '&nbsp;'}</div>
        </div>
        ${langs.length ? `<div class="mini-bar">
          ${langs.map((l,j)=>`<div class="mini-bar-seg" style="background:${LANG_COLORS[j%LANG_COLORS.length]};flex:${l.value||1}"></div>`).join('')}
        </div>` : '<div style="width:80px"></div>'}
        <span class="rank-badge rank-${e.rank||'D'}">${e.rank||'D'}</span>
        <div class="lb-score-col">
          <div class="lb-score-num">${e.score||0}</div>
          <div class="lb-score-sub">/100</div>
        </div>
      </a>`;
    }).join('');
  }

  function startCountdown() {
    countdownSec = REFRESH_INTERVAL;
    const el = document.getElementById('countdownEl');
    clearInterval(countdownTimer);
    countdownTimer = setInterval(() => {
      countdownSec--;
      if (countdownSec <= 0) {
        clearInterval(countdownTimer);
        el.textContent = '';
        fetchLeaderboard();
      } else {
        el.textContent = `Next refresh in ${countdownSec}s`;
      }
    }, 1000);
  }

  // Rank filter buttons
  document.querySelectorAll('.filter-btn[data-rank]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn[data-rank]').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      filterRank = btn.dataset.rank;
      renderRows();
    });
  });

  // Search
  document.getElementById('searchBox').addEventListener('input', e => {
    searchTerm = e.target.value.trim();
    renderRows();
  });

  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

  // Fetch leaderboard — also enrich entries with language data if available
  // by pulling from the last analyze call stored in the leaderboard
  function fetchWithEnrichment() {
    fetch('/api/leaderboard?limit=50')
      .then(r => r.ok ? r.json() : Promise.reject(r.status))
      .then(data => {
        allEntries = data.leaderboard || [];
        document.getElementById('totalBadge').textContent = (data.total || allEntries.length) + ' analyzed';
        renderStats();
        renderRows();
        startCountdown();
      })
      .catch(() => {
        document.getElementById('lbBody').innerHTML =
          '<div class="lb-empty">⚠️ <p>Could not load leaderboard.</p></div>';
      });
  }

  fetchWithEnrichment();
})();
</script>
</body>
</html>
