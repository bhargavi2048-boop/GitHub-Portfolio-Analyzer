<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Portfolio — Loading...</title>

    <!-- OpenGraph / Twitter Card — updated by JS after data loads -->
    <meta property="og:type" content="profile">
    <meta property="og:site_name" content="GitHub Portfolio Analyzer">
    <meta id="og-title" property="og:title" content="GitHub Portfolio">
    <meta id="og-description" property="og:description" content="Analyze and score GitHub developer portfolios.">
    <meta id="og-image" property="og:image" content="/og-default.png">
    <meta id="og-url" property="og:url" content="">
    <meta name="twitter:card" content="summary_large_image">
    <meta id="tw-title" name="twitter:title" content="GitHub Portfolio">
    <meta id="tw-description" name="twitter:description" content="Analyze and score GitHub developer portfolios.">
    <meta id="tw-image" name="twitter:image" content="/og-default.png">

    <style>
        :root {
            --primary-teal: #0d7377; --dark-teal: #051d2a; --light-teal: #14919b;
            --accent-teal: #76c7d1; --text-dark: #1a1a1a; --text-light: #ffffff;
            --bg-light: #f5f9fa; --bg-card: #ffffff; --border-color: #e0e0e0;
            --success: #28a745; --shadow: 0 2px 8px rgba(13,115,119,0.1);
            --shadow-lg: 0 8px 24px rgba(13,115,119,0.15);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0d7377 0%, #051d2a 100%);
            min-height: 100vh; color: var(--text-dark);
        }
        .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Loading */
        .loading-wrap {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 60vh; color: #fff; gap: 20px;
        }
        .spinner {
            width: 52px; height: 52px; border: 4px solid rgba(255,255,255,0.2);
            border-top-color: #76c7d1; border-radius: 50%; animation: spin 1s linear infinite;
        }
        /* Header badge */
        .pub-header {
            text-align: center; padding: 50px 20px 30px; color: var(--text-light);
            animation: fadeInUp 0.7s ease;
        }
        .pub-header h1 { font-size: 2.6em; font-weight: 700; margin-bottom: 8px; }
        .pub-header .tagline { opacity: .85; font-size: 1em; }
        /* Card */
        .pub-card {
            background: var(--bg-card); border-radius: 16px; box-shadow: var(--shadow-lg);
            padding: 40px 36px; margin-bottom: 24px; animation: fadeInUp 0.5s ease;
        }
        .profile-row { display: flex; gap: 28px; align-items: center; margin-bottom: 28px; flex-wrap: wrap; }
        .profile-row img { width: 100px; height: 100px; border-radius: 50%; border: 4px solid var(--accent-teal); }
        .profile-info h2 { font-size: 1.8em; color: var(--text-dark); margin-bottom: 4px; }
        .profile-info .username { color: var(--light-teal); font-size: 1.1em; }
        .profile-info .bio { color: #666; margin-top: 8px; font-size: .95em; }
        .profile-stats { display: flex; gap: 24px; flex-wrap: wrap; margin-top: 14px; }
        .stat { text-align: center; }
        .stat .val { font-size: 1.5em; font-weight: 700; color: var(--primary-teal); }
        .stat .lbl { font-size: .78em; color: #888; }
        /* Score */
        .score-row { display: flex; align-items: center; gap: 28px; flex-wrap: wrap; }
        .score-circle {
            width: 110px; height: 110px; border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-teal), var(--light-teal));
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: #fff; flex-shrink: 0; box-shadow: 0 8px 24px rgba(13,115,119,0.35);
        }
        .score-circle .sc-val { font-size: 2.2em; font-weight: 700; line-height: 1; }
        .score-circle .sc-sub { font-size: .75em; opacity: .85; }
        .rank-pill {
            display: inline-block; background: var(--primary-teal); color: #fff;
            padding: 4px 16px; border-radius: 999px; font-size: 1em; font-weight: 700;
            margin-left: 8px;
        }
        .pillars { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-top: 20px; }
        .pillar { background: var(--bg-light); border-radius: 10px; padding: 14px; border: 1px solid var(--accent-teal); }
        .pillar .p-name { font-size: .82em; color: #888; text-transform: capitalize; }
        .pillar .p-val { font-size: 1.5em; font-weight: 700; color: var(--primary-teal); }
        .pillar .p-bar { height: 6px; background: #eee; border-radius: 3px; margin-top: 6px; }
        .pillar .p-bar-fill { height: 100%; background: var(--primary-teal); border-radius: 3px; transition: width .8s ease; }
        /* Repos */
        .repos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
        .repo-card {
            background: var(--bg-light); border-radius: 12px; padding: 16px;
            border: 1px solid var(--accent-teal); transition: transform .2s, box-shadow .2s;
        }
        .repo-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
        .repo-card h4 { color: var(--primary-teal); margin-bottom: 6px; font-size: .95em; }
        .repo-card p { font-size: .85em; color: #666; margin-bottom: 8px; line-height: 1.4; }
        .repo-meta { font-size: .8em; color: #888; display: flex; gap: 12px; flex-wrap: wrap; }
        /* Languages */
        .lang-bar { display: flex; height: 10px; border-radius: 5px; overflow: hidden; margin: 10px 0; }
        .lang-list { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        .lang-item { display: flex; align-items: center; gap: 5px; font-size: .85em; color: #555; }
        .lang-dot { width: 10px; height: 10px; border-radius: 50%; }
        /* CTA */
        .cta-section { text-align: center; padding: 40px 20px; color: #fff; }
        .cta-section h3 { font-size: 1.6em; margin-bottom: 12px; }
        .cta-section p { opacity: .85; margin-bottom: 20px; }
        .btn-cta {
            display: inline-block; padding: 14px 36px;
            background: #fff; color: var(--primary-teal);
            border-radius: 8px; font-weight: 700; font-size: 1.05em;
            text-decoration: none; transition: transform .2s, box-shadow .2s;
            box-shadow: 0 4px 14px rgba(0,0,0,0.2);
        }
        .btn-cta:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.25); }
        .error-wrap { text-align: center; color: #fff; padding: 80px 20px; }
        .error-wrap h2 { font-size: 2em; margin-bottom: 12px; }

        /* Share / Badge section */
        .share-card {
            background: var(--bg-card); border-radius: 16px; box-shadow: var(--shadow-lg);
            padding: 30px 36px; margin-bottom: 24px; animation: fadeInUp 0.5s ease;
        }
        .share-card h3 { color: var(--primary-teal); margin-bottom: 16px; }
        .share-actions { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
        .share-btn {
            display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px;
            border-radius: 8px; font-size: .9em; font-weight: 600; cursor: pointer;
            border: none; text-decoration: none; transition: transform .15s, box-shadow .15s;
        }
        .share-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 14px rgba(0,0,0,0.15); }
        .share-btn.linkedin { background: #0077b5; color: #fff; }
        .share-btn.twitter { background: #1da1f2; color: #fff; }
        .share-btn.copy { background: var(--primary-teal); color: #fff; }
        .share-btn.print { background: #555; color: #fff; }
        .badge-embed { background: var(--bg-light); border: 1px solid var(--accent-teal); border-radius: 8px; padding: 14px 16px; }
        .badge-embed p { font-size: .82em; color: #888; margin-bottom: 8px; }
        .badge-embed code {
            display: block; font-size: .8em; color: #333;
            word-break: break-all; font-family: monospace; line-height: 1.5;
        }
        .badge-preview { margin-top: 10px; }
        .copy-feedback { color: var(--success); font-size: .8em; margin-left: 8px; opacity: 0; transition: opacity .3s; }
        .copy-feedback.show { opacity: 1; }

        /* Print stylesheet */
        @media print {
            body { background: #fff !important; }
            .share-card, .cta-section, .share-btn, .pub-header .tagline { display: none !important; }
            .pub-card { box-shadow: none !important; border: 1px solid #ddd; break-inside: avoid; }
            .pub-header { color: #000 !important; padding: 20px 0 16px; }
            .pub-header h1 { font-size: 2em; }
            .repo-card:hover { transform: none; }
            .pillars { grid-template-columns: repeat(5, 1fr); }
        }

        @media (max-width: 600px) {
            .profile-row { flex-direction: column; text-align: center; }
            .profile-stats { justify-content: center; }
            .score-row { justify-content: center; flex-direction: column; text-align: center; }
            .pub-card { padding: 24px 16px; }
            .pub-header h1 { font-size: 1.8em; }
            .share-card { padding: 20px 16px; }
        }
    </style>
</head>
<style>
.port-nav-back {
    display: inline-flex; align-items: center; gap: 7px;
    color: rgba(255,255,255,.85); text-decoration: none; font-size: .92em; font-weight: 600;
    background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.25);
    padding: 8px 16px; border-radius: 8px; backdrop-filter: blur(6px);
    margin-bottom: 16px; transition: all .2s;
}
.port-nav-back:hover { background: rgba(255,255,255,.22); color: #fff; transform: translateX(-2px); }
</style>
<body>
<div class="container">
    <a class="port-nav-back" href="/" aria-label="Back to analyzer">← Back to Analyzer</a>
    <div id="root"><div class="loading-wrap"><div class="spinner"></div><p>Loading portfolio…</p></div></div>
</div>
<script>
(function(){
    const LANG_COLORS = ['#0d7377','#14919b','#76c7d1','#2d8a8e','#1a6b6f','#3aadb4','#5bc5cb','#89d7db'];
    // Extract username from URL /p/:username
    const m = location.pathname.match(/\/p\/([^/?#]+)/);
    const username = m && m[1] ? decodeURIComponent(m[1]) : null;
    const root = document.getElementById('root');

    if(!username) {
        root.innerHTML = '<div class="error-wrap"><h2>❌ Invalid URL</h2><p>No username specified.</p><a class="btn-cta" href="/" style="margin-top:16px;">Go Home</a></div>';
        return;
    }

    document.title = `@${username} — GitHub Portfolio`;

    fetch(`/api/public/${encodeURIComponent(username)}`)
        .then(r=>{ if(!r.ok) throw new Error(r.status===404?'User not found':'Failed to load'); return r.json(); })
        .then(d => render(d))
        .catch(e => {
            root.innerHTML = `<div class="error-wrap"><h2>😕 ${e.message}</h2><p>Could not load portfolio for @${username}.</p><a class="btn-cta" href="/" style="margin-top:16px;">Analyze Another Profile</a></div>`;
        });

    function render(d) {
        const p = d.profile||{};
        const s = d.score||{};
        const st = d.stats||{};
        const pillars = s.pillars||{};
        const langs = st.languages||[];

        // Update OpenGraph meta tags dynamically
        const pageUrl = `${location.origin}/p/${encodeURIComponent(username)}`;
        const ogTitle = `${p.name||p.login||username} — GitHub Portfolio Score: ${s.total||0}/100 (Rank ${s.rank||'?'})`;
        const ogDesc = `${p.bio ? p.bio + ' · ' : ''}${st.totalStars||0} stars · ${p.public_repos||0} repos · ${(st.languages||[]).slice(0,3).map(l=>l.name).join(', ')}`;
        const ogImg = p.avatar_url || `${location.origin}/og-default.png`;

        document.title = ogTitle;
        setMeta('og-title', ogTitle); setMeta('og-description', ogDesc);
        setMeta('og-image', ogImg); setMeta('og-url', pageUrl);
        setMeta('tw-title', ogTitle); setMeta('tw-description', ogDesc); setMeta('tw-image', ogImg);

        const shareUrl = pageUrl;
        const badgeUrl = `${location.origin}/api/badge/${encodeURIComponent(username)}.svg`;
        const markdownBadge = `[![GitHub Portfolio Score](${badgeUrl})](${shareUrl})`;

        root.innerHTML = `
        <div class="pub-header">
            <h1>🚀 GitHub Portfolio</h1>
            <p class="tagline">Read-only portfolio snapshot for @${username}</p>
        </div>

        <div class="pub-card">
            <div class="profile-row">
                <img src="${p.avatar_url||''}" alt="@${p.login||username}">
                <div class="profile-info">
                    <h2>${p.name||p.login||username}</h2>
                    <div class="username">@${p.login||username}</div>
                    ${p.bio?`<div class="bio">${esc(p.bio)}</div>`:''}
                    ${p.location?`<div class="bio" style="margin-top:6px;">📍 ${esc(p.location)}</div>`:''}
                    ${p.blog?`<div class="bio"><a href="${esc(p.blog)}" target="_blank" rel="noopener" style="color:var(--light-teal);">🌐 ${esc(p.blog)}</a></div>`:''}
                    <div class="profile-stats">
                        <div class="stat"><div class="val">${p.public_repos||0}</div><div class="lbl">Repos</div></div>
                        <div class="stat"><div class="val">${p.followers||0}</div><div class="lbl">Followers</div></div>
                        <div class="stat"><div class="val">${p.following||0}</div><div class="lbl">Following</div></div>
                        <div class="stat"><div class="val">${st.totalStars||0}</div><div class="lbl">Stars</div></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="pub-card">
            <h3 style="color:var(--primary-teal);margin-bottom:18px;">📊 Portfolio Score</h3>
            <div class="score-row">
                <div class="score-circle">
                    <div class="sc-val">${s.total||0}</div>
                    <div class="sc-sub">/100</div>
                </div>
                <div>
                    <div style="font-size:1.1em;font-weight:600;color:#444;">
                        Rank <span class="rank-pill">${s.rank||'?'}</span>
                    </div>
                    <div style="color:#666;margin-top:8px;font-size:.9em;">
                        Analyzed ${new Date(d.sharedAt||Date.now()).toLocaleDateString()}
                    </div>
                </div>
            </div>
            <div class="pillars">
                ${['activity','quality','impact','diversity','documentation'].map(pk=>`
                    <div class="pillar">
                        <div class="p-name">${pk}</div>
                        <div class="p-val">${pillars[pk]||0}</div>
                        <div class="p-bar"><div class="p-bar-fill" style="width:${pillars[pk]||0}%"></div></div>
                    </div>`).join('')}
            </div>
        </div>

        ${langs.length ? `<div class="pub-card">
            <h3 style="color:var(--primary-teal);margin-bottom:14px;">💻 Languages</h3>
            <div class="lang-bar">
                ${langs.map((l,i)=>`<div style="flex:${l.value};background:${LANG_COLORS[i%LANG_COLORS.length]}" title="${l.name}: ${l.value}"></div>`).join('')}
            </div>
            <div class="lang-list">
                ${langs.map((l,i)=>`<div class="lang-item"><div class="lang-dot" style="background:${LANG_COLORS[i%LANG_COLORS.length]}"></div>${esc(l.name)}</div>`).join('')}
            </div>
        </div>` : ''}

        ${st.topRepos&&st.topRepos.length ? `<div class="pub-card">
            <h3 style="color:var(--primary-teal);margin-bottom:16px;">📚 Top Repositories</h3>
            <div class="repos-grid">
                ${st.topRepos.slice(0,6).map(r=>`
                    <a href="${r.html_url}" target="_blank" rel="noopener" style="text-decoration:none;">
                        <div class="repo-card">
                            <h4>${esc(r.name)}</h4>
                            ${r.description?`<p>${esc(r.description.slice(0,100))}</p>`:'<p style="color:#aaa;font-style:italic;">No description</p>'}
                            <div class="repo-meta">
                                ${r.language?`<span>🔵 ${esc(r.language)}</span>`:''}
                                <span>⭐ ${r.stargazers_count||0}</span>
                                <span>🍴 ${r.forks_count||0}</span>
                                ${r.hasReadme?`<span>📄 README</span>`:''}
                            </div>
                        </div>
                    </a>`).join('')}
            </div>
        </div>` : ''}

        <!-- Share & Badge Card -->
        <div class="share-card">
            <h3>🔗 Share This Portfolio</h3>
            <div class="share-actions">
                <a class="share-btn linkedin" href="https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(shareUrl)}" target="_blank" rel="noopener">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
                    Share on LinkedIn
                </a>
                <a class="share-btn twitter" href="https://twitter.com/intent/tweet?text=${encodeURIComponent(`Check out @${username}'s GitHub portfolio score: ${s.total}/100 (Rank ${s.rank}) 🚀`)}&url=${encodeURIComponent(shareUrl)}" target="_blank" rel="noopener">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.748l7.73-8.835L1.254 2.25H8.08l4.259 5.632zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                    Share on X
                </a>
                <button class="share-btn copy" id="copyLinkBtn" onclick="copyLink('${esc(shareUrl)}')">
                    📋 Copy Link <span class="copy-feedback" id="copyLinkFeedback">Copied!</span>
                </button>
                <button class="share-btn print" onclick="window.print()">🖨️ Print / Save PDF</button>
            </div>
            <div class="badge-embed">
                <p>📌 Embed this badge in your own GitHub README:</p>
                <code id="badgeMarkdown">${esc(markdownBadge)}</code>
                <div class="badge-preview">
                    <img src="${badgeUrl}" alt="Portfolio Score Badge" onerror="this.style.display='none'" style="height:20px;">
                    <button class="share-btn copy" style="margin-top:8px;padding:6px 14px;font-size:.8em;" onclick="copyBadge()">
                        📋 Copy Badge Markdown <span class="copy-feedback" id="copyBadgeFeedback">Copied!</span>
                    </button>
                </div>
            </div>
        </div>

        <div class="cta-section">
            <h3>🔍 Analyze Your Own GitHub Profile</h3>
            <p>Get your free portfolio score, AI insights, and recruiter checklist.</p>
            <a href="/?u=${encodeURIComponent(username)}" class="btn-cta">Analyze @${esc(username)} Now →</a>
        </div>`;
    }

    function setMeta(id, content) {
        const el = document.getElementById(id);
        if (el) el.setAttribute('content', content);
    }

    function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    window.copyLink = function(url) {
        navigator.clipboard.writeText(url).then(() => showFeedback('copyLinkFeedback'));
    };
    window.copyBadge = function() {
        const code = document.getElementById('badgeMarkdown');
        if (code) navigator.clipboard.writeText(code.textContent).then(() => showFeedback('copyBadgeFeedback'));
    };
    function showFeedback(id) {
        const el = document.getElementById(id);
        if (!el) return;
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 2000);
    }
})();
</script>
</body>
</html>
